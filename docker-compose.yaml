networks:
  fairy_tales_network:
    driver: bridge

volumes:
  mysql_data:

services:
  server:
    build: ./server
    container_name: fastapi_server
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - env/mysql.env
    networks:
      - fairy_tales_network
    restart: always

  db:
    image: mysql:8.4
    container_name: mysql_db
    env_file:
      - env/mysql.env
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s
    networks:
      - fairy_tales_network

  client:
    build: ./client
    container_name: frontend_client
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - fairy_tales_network
    restart: always