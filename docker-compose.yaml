networks:
  fairy_tales_network:
    driver: bridge

services:
  server:
    build: ./server
    container_name: fastapi_server
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - env/mysql.env
    environment:
      - DATABASE_URL=mysql+aiomysql://user:password@db:3306/db
      - SECRET_KEY=my-super-secret-key-for-development
      - DEBUG=True
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    networks:
      - fairy_tales_network
    restart: always

  db:
    image: mysql:8.4
    container_name: mysql_db
    env_file:
      - env/mysql.env
    expose:
      - 3306
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s
    networks:
      - fairy_tales_network